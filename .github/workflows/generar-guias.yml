name: Generar guías cada 6 horas

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Permisos necesarios para Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
      - name: Instalar dependencias
        run: npm install node-fetch@2
      
      - name: Verificar API Key
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "❌ ERROR: GROQ_API_KEY no está configurada"
            exit 1
          else
            echo "✅ API Key configurada correctamente"
          fi
      
      - name: Ejecutar generador
        run: node generar-guia.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      - name: Verificar archivos generados
        run: |
          echo "📁 Archivos en el directorio:"
          ls -la
          echo "📄 Archivos de guía:"
          ls -la guia-*.html || echo "⚠️ No hay archivos guia-*.html"
      
      - name: Guardar cambios
        run: |
          git config --global user.name "PlayGames Bot"
          git config --global user.email "bot@playgames.top"
          git add guia-*.html index.html
          if git diff --staged --quiet; then
            echo "✅ No hay cambios para commit"
          else
            git commit -m "🤖 Nuevas guías $(date)"
            git pull --rebase origin main
            git push https://${{ secrets.GITHUB_TOKEN }}@github.com/finals-lab/playgames.top.git main
            echo "✅ Cambios guardados correctamente"
          fi
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Esto sube TODO el contenido de la raíz
      
      - name: Mostrar artifact creado
        run: |
          echo "✅ Artifact subido correctamente"
  
  deploy:
    needs: generar
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: '.'   # Descargar en la raíz
      
      - name: Listar archivos descargados
        run: |
          echo "📁 Archivos descargados:"
          ls -la
          echo "📄 Guías disponibles:"
          ls -la guia-*.html
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
