name: Generar guías cada 6 horas

on:
  schedule:
    # Cron: cada 6 horas (00:00, 06:00, 12:00, 18:00)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  generar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3
      
      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Instalar dependencias
        run: npm install node-fetch@2
      
      - name: Ejecutar generador
        run: node generar-guia.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      
      - name: Guardar cambios
        run: |
          git config --global user.name "PlayGames Bot"
          git config --global user.email "bot@playgames.top"
          git add guia-*.html index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Nuevas guías $(date)"
          git push
